<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>
<body>

<video id="video" controls autoplay muted playsinline>
    <source src="VID-20260514-WA0001.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
let redirected = false;

video.addEventListener("timeupdate", () => {
    if (!redirected && video.currentTime >= 5) {
        redirected = true;
        window.location.href = "https://www.effectivecpmnetwork.com/vw754v04?key=9c7736f7703496c07142402d009db91d";
    }
});
</script>

</body>
</html>
